name: Weekly Refresh Pipeline

on:
  schedule:
    # Run at 06:00 UTC every Sunday
    - cron: '0 6 * * 0'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ingestions
      env:
        ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      run: |
        python -m ingestion.ingest_listing_status
        python -m ingestion.ingest_itot_holdings
        python -m ingestion.ingest_overview
        python -m ingestion.ingest_fundamentals
        python -m ingestion.ingest_corporate_actions
        python -m ingestion.ingest_index_catalog
        python -m ingestion.ingest_news_tickers
        python -m ingestion.ingest_earnings_transcripts --mode forward
        python -m ingestion.ingest_insider_transactions
        python -m ingestion.ingest_institutional_holdings
        python -m ingestion.ingest_etf_profile

    - name: Run Transformations
      env:
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      run: |
        python -m transform.transform_overview
        python -m transform.transform_fundamentals
        python -m transform.transform_corporate_actions
        python -m transform.transform_earnings_transcripts
        python -m transform.transform_insider_transactions
        python -m transform.transform_institutional_holdings
        python -m transform.transform_etf_profile

    - name: Build Gold (weekly tables)
      env:
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      # Order matters:
      #   - dim_company_enriched reads fact_fundamentals_wide
      #   - build_valuation_daily reads fact_fundamentals_wide (refresh it
      #     here so the weekly snapshot reflects the latest fundamentals
      #     rather than waiting for the next daily cron)
      #   - build_sector_aggregates reads fact_valuation_daily +
      #     fact_fundamentals_wide; build_peer_relative reads both plus
      #     fact_sector_aggregates (transitively via shared schema).
      #   - build_insider_signals reads silver/fact_insider_transactions
      #   - build_institutional_concentration reads silver/fact_institutional_*
      #   - build_transcript_sentiment reads silver/fact_transcript_turns +
      #     silver/dim_earnings_calls (transformed earlier in this job)
      #   - build_peer_sets reads gold/dim_company_enriched +
      #     gold/fact_prices_enriched, so it must run AFTER
      #     build_dim_company_enriched
      run: |
        python -m transform_gold.build_fundamentals_wide
        python -m transform_gold.build_dim_company_enriched
        python -m transform_gold.build_valuation_daily
        python -m transform_gold.build_sector_aggregates
        python -m transform_gold.build_peer_relative
        python -m transform_gold.build_insider_signals
        python -m transform_gold.build_institutional_concentration
        python -m transform_gold.build_transcript_sentiment
        python -m transform_gold.build_peer_sets

    - name: Data Quality Checks (weekly suite)
      env:
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      run: python -m quality.runner --suite weekly

    - name: Storage Snapshot
      if: always()
      env:
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      run: python -m observability.storage_scan
